name = "talmud"
main = "src/worker/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom production domain. Requires shaunregenbaum.com to be an active zone
# on the same Cloudflare account (PropheX) that `wrangler whoami` reports.
routes = [
  { pattern = "talmud.shaunregenbaum.com", custom_domain = true }
]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[ai]
binding = "AI"
remote = true

# Route every Workers AI call through Cloudflare AI Gateway "talmud" for
# 7-day prompt caching, per-request observability, and wrapper-side retry on
# 1031/3046 transient failures. Same account as the binding, so no token
# needed — src/worker/ai-gateway.ts uses the binding's gateway option.
# Set AI_GATEWAY_DISABLE = "1" as an emergency kill-switch.
[vars]
AI_GATEWAY_ID = "talmud"
# Default LLM for runLLM() when no explicit model is passed. Phase 1 layers a
# settings-KV override on top; this is the bootstrap default. Either a
# Workers AI binding model (`@cf/...`) or an OpenRouter slug
# (`openrouter/<vendor>/<model>`).
DEFAULT_LLM_MODEL = "@cf/moonshotai/kimi-k2.5"
# Provider slug under the `talmud` AI Gateway when routing OpenRouter calls.
# Must match the provider name added in dash.cloudflare.com → AI → AI Gateway
# → talmud → Providers.
OPENROUTER_GATEWAY_PROVIDER = "openrouter"

[[kv_namespaces]]
binding = "CACHE"
# entity-contract branch namespace — fork from prod (id 957172c2...) on
# 2026-05-04. Source-text caches (HebrewBooks, Sefaria pre-aligned bundles,
# Rishonim, halacha refs, topics, SA commentaries) were migrated; everything
# else (analyze:*, enrich:*, mark-defs:*, llm-settings:*) starts empty.
# Migration script: Sandbox/2026-05-04-kv-fork/migrate.mjs
id = "f373689f767c477e98cf3b644a4d05bd"

# Workers Observability — captures logs, errors, metrics visible in the CF
# dashboard under Workers > talmud > Logs. Lets us see prod errors like
# "JSON.parse: unexpected character" without needing an external logger.
[observability]
enabled = true
head_sampling_rate = 1  # capture 100% of invocations

# Background cache-warmer. Walks the full shas at ~1 amud/sec, 20 per run,
# filling KV with no TTL. Latches to done when complete; bump warm-cursor:v1
# key to force a re-walk. See src/worker/warm-cron.ts.
#
# Second cron (03:00 UTC daily) pre-warms tomorrow's Daf Yomi — analyze,
# halacha, aggadata, and daf-context (rabbi timeline + geography) for both
# amudim. See src/worker/yomi-cron.ts. index.ts dispatches on controller.cron.
[triggers]
crons = ["*/5 * * * *", "0 3 * * *"]

# Durable Workflows — background halacha enrichment across all dafim.
# One instance per tractate; each step runs one daf through all 3 strategies,
# writing to KV. Retryable/pausable/resumable. Invoke via POST to
# /api/admin/enrich-halacha-batch/{tractate}.
[[workflows]]
name = "halacha-enrich"
binding = "HALACHA_ENRICH"
class_name = "HalachaEnrichWorkflow"

# Per-entity-type enrichment workflows — each walks one tractate's dafim and
# runs every strategy through the corresponding /api/enrich-* endpoint.
# Argument workflow is the highest-leverage one (7 strategies, gates the
# argument sidebar UX). All three discover daf list from KV prefixes and
# route every AI call through the gateway.
[[workflows]]
name = "argument-enrich"
binding = "ARGUMENT_ENRICH"
class_name = "ArgumentEnrichWorkflow"

[[workflows]]
name = "aggadata-enrich"
binding = "AGGADATA_ENRICH"
class_name = "AggadataEnrichWorkflow"

[[workflows]]
name = "pesukim-enrich"
binding = "PESUKIM_ENRICH"
class_name = "PesukimEnrichWorkflow"

# Cloudflare Email Service binding. Requires shaunregenbaum.com onboarded
# at https://dash.cloudflare.com/?to=/:account/email-service/sending
# (auto-adds MX/SPF/DKIM/DMARC records on cf-bounce.shaunregenbaum.com).
# Sender uses warm-cron@shaunregenbaum.com; recipient is anywhere.
# Used by warm-cron.ts to notify on full-shas backfill completion.
[[send_email]]
name = "EMAIL"
remote = true
