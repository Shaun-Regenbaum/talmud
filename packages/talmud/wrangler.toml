name = "talmud"
main = "src/worker/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Dynamic Worker Loader — powers the code-mode MCP server at /mcp. The `execute`
# tool runs LLM-written code in an isolated worker spun up via env.LOADER; the
# sandbox has no env/secrets and no outbound network (its only host access is the
# /api request bridge in src/worker/mcp.ts). See @cloudflare/codemode.
worker_loaders = [{ binding = "LOADER" }]

# Custom production domains. Both zones must be active on the same Cloudflare
# account (PropheX) that `wrangler whoami` reports. talmud.dev and
# talmud.shaunregenbaum.com point at this same worker — identical backend,
# KV cache, queues, and crons (one deployment, three hostnames).
routes = [
  { pattern = "talmud.shaunregenbaum.com", custom_domain = true },
  { pattern = "talmud.dev", custom_domain = true },
  { pattern = "www.talmud.dev", custom_domain = true }
]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Raise the CPU ceiling well above the 30s default. Queue jobs that parse a
# large LLM streaming response (argument-move on a long daf emits a big
# structured JSON) can accumulate CPU time in the SSE parser; the default cap
# would kill the invocation with an opaque "operation aborted". Workers Paid
# allows up to 300_000ms (5 min). Wall-clock for queue consumers is separately
# bounded at 15 min by the platform; this only governs on-CPU time.
[limits]
cpu_ms = 300000

# Workers AI binding (env.AI.run('@cf/...')). NOT the same as the AI Gateway
# URL — the Gateway is a fetch() target hit by src/worker/llm.ts using the
# OPENROUTER_API_KEY Bearer header, and is what every active LLM call uses.
# This [ai] binding is a separate runtime binding for direct Workers AI
# calls. With `remote = true`, miniflare proxies dev calls to the real
# service which needs a fresh `wrangler login`. The `npm run dev` script
# pre-flights `wrangler whoami` and warns if login is expired (otherwise
# any first request to the worker returns "fetch failed" at the
# miniflare→workerd boundary with no useful cause string).
[ai]
binding = "AI"
remote = true

# AI Gateway routing — observability + 7-day prompt caching for every LLM
# call (OpenRouter + Workers AI when re-enabled). Set AI_GATEWAY_DISABLE = "1"
# as an emergency kill-switch.
[vars]
AI_GATEWAY_ID = "talmud"
# Default LLM for runLLM() when no explicit model is passed. The settings KV
# layer can override at runtime; this is the bootstrap default. Either an
# OpenRouter slug or a Workers AI binding model (`@cf/...`, requires the
# [ai] block above).
DEFAULT_LLM_MODEL = "openrouter/deepseek/deepseek-v4-pro"
# Provider slug under the `talmud` AI Gateway when routing OpenRouter calls.
# Must match the provider name added in dash.cloudflare.com → AI → AI Gateway
# → talmud → Providers.
OPENROUTER_GATEWAY_PROVIDER = "openrouter"
# Full-Shas rabbi.observations backfill. When "1", the 5-min warm-cron runs a
# dedicated, self-latching backfill phase: its own cursor walks the whole shas
# once (~20 amudim/tick ≈ ~1 day), enqueues one cache-respecting
# rabbi.observations job per amud, then latches done and stops for good.
# Cache-respecting, so already-computed amudim are ~$0 hits; a cold full pass ≈
# ~$70 (entity marks only). Safe to leave at "1" — it's a no-op once latched.
# To re-run a pass, delete the obs-backfill-cursor:v1 KV key.
OBSERVATIONS_WARM_SHAS = "1"
# Gradual dafyomi.co.il (Kollel Iyun HaDaf) ingestion. When "1", the warm cron
# walks all of Shas a couple dapim per 5-min tick (hub-driven live fetch, then
# KV-cached forever — gentle, ~4-5 days for a full pass), then latches done and
# emails. A no-op once latched. To re-run, delete the dafyomi-warm-cursor:v1 KV
# key. Feeds study notes + poskim into the halacha cards Shas-wide.
DAFYOMI_WARM_SHAS = "1"
# When "1", the warm cron incrementally materializes the per-tractate spine-view
# snapshot shelf (spine-view:v1:{tractate}) — a window of warmed dapim per tick,
# published at end-of-tractate-pass — so GET /api/spine-view?cached=1 serves the
# whole tractate's flow graph in one KV get (O(1), no 60-daf bound). Perpetual:
# each pass re-derives from current pieces. To reset, delete spine-view-cursor:v1.
SPINE_VIEW_WARM_SHAS = "1"
# Zone ids for the Usage-page activity tracker. Not secret. COMMA-SEPARATED:
# the app is served on two zones (shaunregenbaum.com + talmud.dev) and
# src/worker/cf-zone-analytics.ts queries each, then merges the daily rows so
# Usage shows combined traffic across both domains. Order is
# shaunregenbaum.com, talmud.dev. Used to query CF zone HTTP analytics
# (httpRequests1dGroups) for app accesses + country breakdown. The query needs
# a token with "Zone Analytics: Read" on EVERY listed zone, set as the
# CF_ZONE_ANALYTICS_TOKEN secret (`wrangler secret put CF_ZONE_ANALYTICS_TOKEN`);
# it falls back to CF_ANALYTICS_TOKEN if that one is broadened to include zone
# analytics. A zone the token can't read is dropped from the merge (the others
# still report); it does not break the page.
CF_ZONE_TAG = "4808b439c50e3a42494ae7e0b2fa1bec,af7b181368ea154cd40b55404b47d818"
# LLM spend budget (USD), enforced by src/worker/budget.ts at the runLLM
# chokepoint. DAILY_BUDGET_USD is a hard ceiling on ALL spend per UTC day (the
# guard latches a pause at 95% of this to leave headroom for in-flight jobs);
# HOURLY_CUSTOM_BUDGET_USD caps spend on user-submitted custom questions per
# rolling hour. These are the code defaults made explicit/tunable here — edit +
# redeploy to change them. The privileged /api/run knobs + admin
# mutations are gated by the STUDIO_SECRET secret (`wrangler secret put
# STUDIO_SECRET`); unset => everyone is treated as untrusted (fail-safe).
DAILY_BUDGET_USD = "300"
HOURLY_CUSTOM_BUDGET_USD = "10"

# Cloudflare Queue — long-running enrichment jobs run in the consumer worker
# instead of holding the producer's request invocation. Producer (POST
# /api/run) enqueues + returns 202 with a runId; consumer processes
# the message and writes the result to KV under `job:{runId}`. Client polls
# /api/run-status/:runId. Decouples client requests from LLM latency
# and stops workerd from dying on parallel long-fetches in dev.
# Phase 3 (step 1): generation as a Cloudflare Workflow. The warm Workflow
# generates a daf's whole-daf pieces as separate checkpointed STEPS — each step
# its own invocation with its own 128 MB budget, so the per-step memory can't pile
# up the way one monolithic generation job does. Additive: triggered by
# POST /api/admin/workflow-warm; the live queue/run/reader paths are untouched.
[[workflows]]
name = "daf-warm"
binding = "DAF_WARM_WORKFLOW"
class_name = "DafWarmWorkflow"

[[queues.producers]]
queue = "enrichment-jobs"
binding = "ENRICHMENT_QUEUE"

[[queues.consumers]]
queue = "enrichment-jobs"
max_batch_size = 1
max_batch_timeout = 1
# History: 2 → 10 → 50, each bump chasing warming THROUGHPUT (the old note
# reasoned concurrency "caps LLM workloads, not CPU on a single isolate"). That
# missed the real per-isolate constraint: MEMORY. Concurrent queue invocations
# can be co-scheduled on ONE isolate, and each cold generation materialized the
# daf's source bundles (multi-MB on a dense daf) → 50-wide blew the hard 128 MB
# isolate limit, killed the isolate, and every co-tenant request (incl. plain
# HTTP /api/run) came back `error code: 1101`. That was the cold-daf OOM.
#
# Now that per-job source memory is bounded (rishonim capped at the cache
# boundary #440; concurrent same-daf loads coalesced to one copy #439), peak
# isolate memory is ~ max_concurrency × per-job footprint. 16 keeps the worst
# case (all co-scheduled + dense) comfortably under 128 MB while still warming
# far faster than the old 10 (~12h full-Shas). Raise only alongside a measured
# drop in per-job footprint — warming speed is a background concern; a reader
# OOM is not. AI Gateway + runLLM's per-call retry ride out provider 429s within
# a job, so queue-level retries aren't burned.
max_concurrency = 16
max_retries = 1

[[kv_namespaces]]
binding = "CACHE"
# entity-contract branch namespace — fork from prod (id 957172c2...) on
# 2026-05-04. Source-text caches (HebrewBooks, Sefaria pre-aligned bundles,
# Rishonim, halacha refs, topics, SA commentaries) were migrated; everything
# else (analyze:*, enrich:*, mark-defs:*, llm-settings:*) starts empty.
# (One-time migration; the fork script has since been removed.)
id = "f373689f767c477e98cf3b644a4d05bd"

# Workers Observability — captures logs, errors, metrics visible in the CF
# dashboard under Workers > talmud > Logs. Lets us see prod errors like
# "JSON.parse: unexpected character" without needing an external logger.
[observability]
enabled = true
head_sampling_rate = 1  # capture 100% of invocations

# Background cache-warmer. Walks the full shas at ~1 amud/sec, 20 per run,
# filling KV with no TTL. Latches to done when complete; bump warm-cursor:v1
# key to force a re-walk. See src/worker/warm-cron.ts.
#
# Second cron (03:00 UTC daily) pre-warms tomorrow's Daf Yomi via
# /api/run for the canonical mark set. See src/worker/yomi-cron.ts.
[triggers]
crons = ["*/5 * * * *", "0 3 * * *"]

# Cloudflare Email Service binding (env.EMAIL.send(...)). Same `remote = true`
# auth path as [ai] above — needs fresh `wrangler login`. Used by
# warm-cron.ts to notify on full-shas backfill completion. Pre-flight check
# in `npm run dev` warns when the login is expired so this doesn't silently
# brick miniflare boot.
[[send_email]]
name = "EMAIL"
remote = true
